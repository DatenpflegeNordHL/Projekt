name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Static checks and tests
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee "test-node-${{ matrix.node-version }}.log"
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-node-${{ matrix.node-version }}-diagnostics
          path: test-node-${{ matrix.node-version }}.log
          retention-days: 3
      - name: Diff hygiene
        run: git diff --check

  ralphex-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Install Ralphex v1.6.0
        shell: bash
        run: |
          go install github.com/umputun/ralphex/cmd/ralphex@v1.6.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run real Ralphex offline fixture
        shell: bash
        run: |
          set -o pipefail
          RALPHEX_BIN="$(command -v ralphex)" node tests/ralphex-e2e.mjs 2>&1 | tee ralphex-e2e.log
      - name: Upload Ralphex diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ralphex-e2e-diagnostics
          path: ralphex-e2e.log
          retention-days: 3
      - name: Diff hygiene
        run: git diff --check

  live-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOSEROUTER_API_KEY: ${{ secrets.CLOSEROUTER_API_KEY }}
      CODEXLOOPER_LIVE_MAX_OUTPUT_TOKENS: "64"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Detect authorized trigger
        id: trigger
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git show --pretty='' --name-only "$HEAD_SHA" | grep -Fxq '.github/live-smoke-trigger'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.trigger.outputs.run == 'true'
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        if: steps.trigger.outputs.run == 'true'
        with:
          go-version: "1.26.x"

      - name: Require CloseRouter credential
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          if [ -z "${CLOSEROUTER_API_KEY:-}" ]; then
            echo "CODEXLOOPER_LIVE_SMOKE=BLOCK: repository secret CLOSEROUTER_API_KEY is missing" | tee live-smoke.log
            exit 1
          fi

      - name: Install verified toolchain
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          set -o pipefail
          npm install --global @openai/codex@latest mex-agent@0.6.3 2>&1 | tee toolchain.log
          go install github.com/umputun/ralphex/cmd/ralphex@v1.6.0 2>&1 | tee -a toolchain.log
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify tool versions
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          codex --version
          mex --version || mex commands >/dev/null
          ralphex --version

      - name: Configure local Git identity
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name "CodexLooper Smoke"
          git config user.email "codexlooper-smoke@users.noreply.github.com"

      - name: Install CodexLooper integration
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          node scripts/install.mjs \
            --project "$GITHUB_WORKSPACE" \
            --real-codex "$(command -v codex)" \
            --mex-command "$(command -v mex)" \
            --ralphex-command "$(command -v ralphex)"

      - name: Export controlled profile paths
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          node --input-type=module <<'NODE' >> "$GITHUB_ENV"
          import { readFileSync } from "node:fs";
          const state = JSON.parse(readFileSync(".codexlooper/install-state.json", "utf8"));
          console.log(`CODEXLOOPER_REAL_CODEX=${state.real_codex}`);
          console.log(`CODEX_HOME=${state.codex_home}`);
          console.log(`CODEXLOOPER_BUILDER_MODEL=${state.builder.model}`);
          console.log(`CODEXLOOPER_BUILDER_REASONING=${state.builder.reasoning}`);
          console.log(`CODEXLOOPER_REVIEW_MODEL=${state.reviewer.model}`);
          console.log(`CODEXLOOPER_REVIEW_REASONING=${state.reviewer.reasoning}`);
          console.log(`CODEXLOOPER_ALLOWED_MODELS=${state.builder.model},${state.reviewer.model}`);
          console.log("CODEXLOOPER_RUN_CLI_SMOKE=1");
          NODE

      - name: Run real Terra and Sol smoke
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          set -o pipefail
          npm run live-smoke 2>&1 | tee live-smoke.log

      - name: Upload live smoke evidence
        if: always() && steps.trigger.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codexlooper-live-smoke
          path: |
            .codexlooper/live-smoke-receipt.json
            live-smoke.log
            toolchain.log
          if-no-files-found: warn
          retention-days: 7
