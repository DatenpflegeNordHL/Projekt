name: Codex Provider Matrix

on:
  pull_request:

permissions:
  contents: read

jobs:
  matrix:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feature/wp1-minimal-loop'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOSEROUTER_API_KEY: ${{ secrets.CLOSEROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Detect authorized matrix trigger
        id: trigger
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git show --pretty='' --name-only "$HEAD_SHA" | grep -Fxq '.github/provider-matrix-trigger'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.trigger.outputs.run == 'true'
        with:
          node-version: 22

      - name: Require CloseRouter credential
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          test -n "${CLOSEROUTER_API_KEY:-}"

      - name: Install Codex CLI
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: npm install --global @openai/codex@latest >/dev/null 2>&1

      - name: Run provider and sandbox matrix
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          set -u
          MATRIX_ROOT="$RUNNER_TEMP/codex-provider-matrix"
          mkdir -p "$MATRIX_ROOT"
          export MATRIX_ROOT

          CUSTOM_HOME="$MATRIX_ROOT/custom-home"
          BUILTIN_HOME="$MATRIX_ROOT/builtin-home"
          mkdir -p "$CUSTOM_HOME" "$BUILTIN_HOME"
          chmod 700 "$CUSTOM_HOME" "$BUILTIN_HOME"

          cat > "$CUSTOM_HOME/config.toml" <<'EOF'
          model_provider = "closerouter"

          [model_providers.closerouter]
          name = "CloseRouter"
          base_url = "https://api.closerouter.dev/v1"
          env_key = "CLOSEROUTER_API_KEY"
          wire_api = "responses"
          request_max_retries = 0
          stream_max_retries = 0
          stream_idle_timeout_ms = 60000
          requires_openai_auth = false
          supports_websockets = false
          EOF

          cat > "$BUILTIN_HOME/config.toml" <<'EOF'
          model_provider = "openai"
          openai_base_url = "https://api.closerouter.dev/v1"
          EOF

          : > "$MATRIX_ROOT/cases.tsv"

          run_case() {
            label="$1"
            provider="$2"
            sandbox="$3"
            prompt="$4"
            expected_file="$5"
            repo="$MATRIX_ROOT/repo-$label"
            home="$CUSTOM_HOME"
            mkdir -p "$repo"
            git -C "$repo" init -b main >/dev/null
            git -C "$repo" config user.name "CodexLooper Matrix"
            git -C "$repo" config user.email "matrix@example.invalid"
            printf '# Matrix fixture\n' > "$repo/README.md"
            git -C "$repo" add README.md
            git -C "$repo" commit -m 'chore: initialize matrix fixture' >/dev/null

            if [ "$provider" = "builtin" ]; then
              home="$BUILTIN_HOME"
            fi

            set +e
            if [ "$provider" = "builtin" ]; then
              printf '%s' "$prompt" | env \
                CODEX_HOME="$home" \
                OPENAI_API_KEY="$CLOSEROUTER_API_KEY" \
                CLOSEROUTER_API_KEY= \
                timeout 150s codex exec --json --ephemeral --sandbox "$sandbox" \
                  -c 'model="openai/gpt-5.6-terra"' \
                  -c model_reasoning_effort=low \
                  > "$MATRIX_ROOT/$label.jsonl" 2> "$MATRIX_ROOT/$label.stderr"
            else
              printf '%s' "$prompt" | env \
                CODEX_HOME="$home" \
                CLOSEROUTER_API_KEY="$CLOSEROUTER_API_KEY" \
                OPENAI_API_KEY= \
                timeout 150s codex exec --json --ephemeral --sandbox "$sandbox" \
                  -c 'model="openai/gpt-5.6-terra"' \
                  -c model_reasoning_effort=low \
                  > "$MATRIX_ROOT/$label.jsonl" 2> "$MATRIX_ROOT/$label.stderr"
            fi
            status=$?
            set -e

            file_created=false
            if [ "$expected_file" != "-" ] && [ -f "$repo/$expected_file" ]; then
              file_created=true
            fi
            printf '%s\t%s\t%s\t%s\t%s\n' \
              "$label" "$provider" "$sandbox" "$status" "$file_created" \
              >> "$MATRIX_ROOT/cases.tsv"
          }

          run_case custom-read custom read-only \
            'Return exactly MATRIX_READ_OK and do not use tools.' '-'
          run_case custom-write custom workspace-write \
            'Do not use git. Create matrix.txt containing exactly matrix-pass and then return MATRIX_WRITE_OK.' 'matrix.txt'
          run_case builtin-read builtin read-only \
            'Return exactly MATRIX_READ_OK and do not use tools.' '-'
          run_case builtin-write builtin workspace-write \
            'Do not use git. Create matrix.txt containing exactly matrix-pass and then return MATRIX_WRITE_OK.' 'matrix.txt'

      - name: Produce secret-free matrix result
        if: always() && steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { existsSync, readFileSync, writeFileSync } from "node:fs";
          import { resolve } from "node:path";

          const root = process.env.MATRIX_ROOT || resolve(process.env.RUNNER_TEMP, "codex-provider-matrix");
          const secret = process.env.CLOSEROUTER_API_KEY;
          const rows = existsSync(resolve(root, "cases.tsv"))
            ? readFileSync(resolve(root, "cases.tsv"), "utf8").trim().split("\n").filter(Boolean)
            : [];
          const results = rows.map((row) => {
            const [label, provider, sandbox, rawStatus, rawFileCreated] = row.split("\t");
            const stdoutPath = resolve(root, `${label}.jsonl`);
            const stderrPath = resolve(root, `${label}.stderr`);
            const stdout = existsSync(stdoutPath) ? readFileSync(stdoutPath, "utf8") : "";
            const stderr = existsSync(stderrPath) ? readFileSync(stderrPath, "utf8") : "";
            if ((secret && stdout.includes(secret)) || (secret && stderr.includes(secret))) {
              throw new Error(`Credential leaked in ${label}`);
            }
            const events = stdout.split(/\r?\n/).filter(Boolean).flatMap((line) => {
              try { return [JSON.parse(line)]; } catch { return []; }
            });
            const errors = events
              .filter((event) => event.type === "error" || event.type === "turn.failed")
              .map((event) => String(event.error?.message || event.message || "unknown").slice(-1000));
            return {
              label,
              provider,
              sandbox,
              exit_code: Number(rawStatus),
              turn_completed: events.some((event) => event.type === "turn.completed"),
              file_created: rawFileCreated === "true",
              errors,
              stderr_tail: stderr.replaceAll(secret || "__NO_SECRET__", "[REDACTED]").slice(-1000),
            };
          });
          const summary = {
            schema: "codexlooper.provider-matrix.v1",
            created_at: new Date().toISOString(),
            codex_version: "0.144.6-or-current",
            results,
          };
          const path = resolve(root, "summary.json");
          writeFileSync(path, `${JSON.stringify(summary, null, 2)}\n`, { mode: 0o600 });
          console.log(JSON.stringify(summary));
          NODE

      - name: Upload provider matrix summary
        if: always() && steps.trigger.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codex-provider-matrix
          path: ${{ runner.temp }}/codex-provider-matrix/summary.json
          if-no-files-found: error
          retention-days: 7
