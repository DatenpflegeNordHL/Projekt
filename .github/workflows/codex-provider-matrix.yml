name: Codex Provider Matrix

on:
  pull_request:

permissions:
  contents: read

jobs:
  matrix:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feature/wp1-minimal-loop'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOSEROUTER_API_KEY: ${{ secrets.CLOSEROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Detect authorized matrix trigger
        id: trigger
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git show --pretty='' --name-only "$HEAD_SHA" | grep -Fxq '.github/provider-matrix-trigger'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.trigger.outputs.run == 'true'
        with:
          node-version: 22

      - name: Require CloseRouter credential
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: test -n "${CLOSEROUTER_API_KEY:-}"

      - name: Install Codex CLI
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: npm install --global @openai/codex@latest >/dev/null 2>&1

      - name: Run custom-provider write case with activated writable root
        if: steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          set -u
          MATRIX_ROOT="$RUNNER_TEMP/codex-provider-matrix"
          REPO="$MATRIX_ROOT/repo-custom-write-root"
          CODEX_HOME="$MATRIX_ROOT/custom-home"
          mkdir -p "$REPO" "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"

          cat > "$CODEX_HOME/config.toml" <<EOF
          model_provider = "closerouter"
          sandbox_mode = "workspace-write"
          approval_policy = "never"

          [model_providers.closerouter]
          name = "CloseRouter"
          base_url = "https://api.closerouter.dev/v1"
          env_key = "CLOSEROUTER_API_KEY"
          wire_api = "responses"
          request_max_retries = 0
          stream_max_retries = 0
          stream_idle_timeout_ms = 60000
          requires_openai_auth = false
          supports_websockets = false

          [sandbox_workspace_write]
          writable_roots = ["$REPO"]
          EOF

          git -C "$REPO" init -b main >/dev/null
          git -C "$REPO" config user.name "CodexLooper Matrix"
          git -C "$REPO" config user.email "matrix@example.invalid"
          printf '# Matrix fixture\n' > "$REPO/README.md"
          git -C "$REPO" add README.md
          git -C "$REPO" commit -m 'chore: initialize matrix fixture' >/dev/null

          set +e
          (
            cd "$REPO"
            printf '%s' \
              'Do not use git. Using a relative path, create matrix.txt containing exactly matrix-pass and then return MATRIX_WRITE_OK.' \
              | env \
                  CODEX_HOME="$CODEX_HOME" \
                  CLOSEROUTER_API_KEY="$CLOSEROUTER_API_KEY" \
                  OPENAI_API_KEY= \
                  timeout 150s codex exec --json --ephemeral --sandbox workspace-write \
                    -c 'model="openai/gpt-5.6-terra"' \
                    -c model_reasoning_effort=low
          ) > "$MATRIX_ROOT/custom-write-root.jsonl" 2> "$MATRIX_ROOT/custom-write-root.stderr"
          status=$?
          set -e
          printf '%s\n' "$status" > "$MATRIX_ROOT/exit-code.txt"

      - name: Produce secret-free matrix result
        if: always() && steps.trigger.outputs.run == 'true'
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { existsSync, readFileSync, writeFileSync } from "node:fs";
          import { resolve } from "node:path";

          const root = resolve(process.env.RUNNER_TEMP, "codex-provider-matrix");
          const repo = resolve(root, "repo-custom-write-root");
          const secret = process.env.CLOSEROUTER_API_KEY;
          const stdout = existsSync(resolve(root, "custom-write-root.jsonl"))
            ? readFileSync(resolve(root, "custom-write-root.jsonl"), "utf8")
            : "";
          const stderr = existsSync(resolve(root, "custom-write-root.stderr"))
            ? readFileSync(resolve(root, "custom-write-root.stderr"), "utf8")
            : "";
          if ((secret && stdout.includes(secret)) || (secret && stderr.includes(secret))) {
            throw new Error("Credential leaked in provider matrix");
          }
          const events = stdout.split(/\r?\n/).filter(Boolean).flatMap((line) => {
            try { return [JSON.parse(line)]; } catch { return []; }
          });
          const errors = events
            .filter((event) => event.type === "error" || event.type === "turn.failed")
            .map((event) => String(event.error?.message || event.message || "unknown").slice(-1000));
          const matrixPath = resolve(repo, "matrix.txt");
          const summary = {
            schema: "codexlooper.provider-matrix.v4",
            created_at: new Date().toISOString(),
            provider: "custom",
            sandbox: "workspace-write",
            config_sandbox_mode: true,
            approval_policy: "never",
            explicit_writable_root: true,
            exit_code: Number(readFileSync(resolve(root, "exit-code.txt"), "utf8").trim()),
            turn_completed: events.some((event) => event.type === "turn.completed"),
            file_created: existsSync(matrixPath),
            file_content_ok: existsSync(matrixPath) && readFileSync(matrixPath, "utf8").trim() === "matrix-pass",
            errors,
            stderr_tail: stderr.replaceAll(secret || "__NO_SECRET__", "[REDACTED]").slice(-1000),
          };
          writeFileSync(resolve(root, "summary.json"), `${JSON.stringify(summary, null, 2)}\n`, { mode: 0o600 });
          console.log(JSON.stringify(summary));
          if (
            summary.exit_code !== 0 ||
            !summary.turn_completed ||
            !summary.file_created ||
            !summary.file_content_ok
          ) {
            process.exitCode = 1;
          }
          NODE

      - name: Upload provider matrix summary
        if: always() && steps.trigger.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codex-provider-matrix
          path: ${{ runner.temp }}/codex-provider-matrix/summary.json
          if-no-files-found: error
          retention-days: 7
